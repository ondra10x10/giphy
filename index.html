<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Coudek GIF Studio</title>
  <meta name="description" content="Coudek GIF Studio - premium reaction GIFs, memes and motion assets for GIPHY and Instagram." />
  <meta name="keywords" content="GIFs, memes, reactions, GIPHY creator, Instagram GIFs" />
  <meta name="author" content="Coudek" />

  <meta property="og:title" content="Coudek GIF Studio" />
  <meta property="og:description" content="Premium reaction GIFs and meme animations." />
  <meta property="og:type" content="website" />

  <style>
    :root{
      --bg:#0b0f14;
      --panel:rgba(255,255,255,0.06);
      --border:rgba(255,255,255,0.10);
      --text:#e8eef6;
      --muted:#9aa4b2;
      --accent:#7c5cff;
      --accent2:#00d4ff;
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:ui-sans-serif,system-ui;
      background:radial-gradient(1000px 500px at 20% 0%,rgba(124,92,255,0.25),transparent),
                 radial-gradient(900px 500px at 80% 0%,rgba(0,212,255,0.15),transparent),
                 var(--bg);
      color:var(--text);
    }

    .container{max-width:1100px;margin:auto;padding:30px;}

    nav{
      display:flex;justify-content:space-between;align-items:center;
      padding:20px 0;
    }

    .logo{font-weight:700;letter-spacing:1px;}

    .hero{
      text-align:center;
      padding:70px 20px;
    }

    .hero h1{font-size:46px;}
    .hero p{color:var(--muted);max-width:600px;margin:10px auto;}

    .btn{
      padding:10px 14px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--text);
      cursor:pointer;
    }

    .btn.primary{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
      margin-top:30px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:14px;
      padding:15px;
    }

    .gif img{
      width:100%;
      border-radius:12px;
      display:block;
    }

    .search{
      display:flex;
      gap:10px;
      justify-content:center;
      margin-top:20px;
    }

    input{
      padding:10px;
      border-radius:10px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.05);
      color:var(--text);
      width:260px;
    }

    section{margin-top:60px;}

    form{
      display:grid;
      gap:10px;
    }

    textarea,input{
      padding:10px;
      border-radius:10px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.05);
      color:var(--text);
    }
  </style>
</head>
<body>

<div class="container">

  <nav>
    <div class="logo">Coudek GIF Studio</div>
    <div>
      <button class="btn" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})">Contact</button>
    </div>
  </nav>

  <div class="hero">
    <h1>Premium GIF Creation Studio</h1>
    <p>High-quality reaction GIFs and meme content distributed via GIPHY and modern social platforms.</p>

    <div class="search">
      <input id="query" placeholder="Search GIFs..." />
      <button class="btn primary" onclick="searchGIFs()">Search</button>
    </div>
  </div>

  <section>
    <div id="gif-grid" class="grid"></div>
  </section>

  <section id="contact">
    <h2>Contact</h2>
    <div class="card">
      <form action="mailto:Ondra10x10@outlook.cz" method="post" enctype="text/plain">
        <input type="text" name="name" placeholder="Name" required />
        <input type="email" name="email" placeholder="Email" required />
        <textarea name="message" placeholder="Message" required></textarea>
        <button class="btn primary" type="submit">Send</button>
      </form>
    </div>
  </section>

</div>

<script>
const API_KEY = "YOUR_GIPHY_API_KEY";

async function loadTrending(){
  const res = await fetch(`https://api.giphy.com/v1/gifs/trending?api_key=${API_KEY}&limit=12`);
  const data = await res.json();
  render(data.data);
}

async function searchGIFs(){
  const q = document.getElementById('query').value;
  const res = await fetch(`https://api.giphy.com/v1/gifs/search?api_key=${API_KEY}&q=${q}&limit=12`);
  const data = await res.json();
  render(data.data);
}

function render(items){
  const grid = document.getElementById('gif-grid');
  grid.innerHTML = '';

  items.forEach(gif => {
    const url = gif.images.fixed_height.url;
    const div = document.createElement('div');
    div.className = 'card gif';
    div.innerHTML = `<img src="${url}" />`;
    grid.appendChild(div);
  });
}

loadTrending();
</script>

</body>
</html>
